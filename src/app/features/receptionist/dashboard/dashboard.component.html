<div class="p-6 md:p-10 space-y-8 bg-background text-on-surface font-body min-h-screen">
  @if (vm$ | async; as vm) {
    <app-dashboard-summary [totalAppointments]="vm.totalAppointments">
      <app-doctor-availability [doctors]="vm.doctors" />
    </app-dashboard-summary>

    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold tracking-tighter text-primary font-headline">
        Receptionist Dashboard
      </h1>
      <p class="text-xs text-on-surface-variant">
        Last updated: {{ vm.lastUpdated ? (vm.lastUpdated | date: 'shortTime') : '--' }}
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <app-queue-list
        class="contents"
        [items]="vm.queueItems"
        [loading]="vm.loading"
        [error]="vm.error"
        (checkIn)="onCheckIn($event)"
      />
    </div>
  }
</div>
